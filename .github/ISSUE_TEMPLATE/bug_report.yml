name: Bug report
description: Report a reproducible problem in the library, examples, dashboard, or documentation
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thank you for helping improve the project. Do not include confidential or personal data.

  - type: textarea
    id: summary
    attributes:
      label: Problem summary
      description: Describe what went wrong and where it occurred.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Provide the smallest code sample and synthetic data that reproduce the issue.
      render: python
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour and traceback
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: 3.12.4
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Operating system
      placeholder: Ubuntu 24.04, Windows 11, macOS 15
    validations:
      required: true

  - type: textarea
    id: versions
    attributes:
      label: Relevant package versions
      description: Include dataviz-reference, pandas, matplotlib, Plotly, Streamlit, or Datashader versions as applicable.
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: I used synthetic or non-sensitive data.
          required: true
